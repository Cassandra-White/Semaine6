#############################################################
# billu-server.conf -- BillU Sprint 6
# Syslog-ng serveur centralise
# Chemin : /etc/syslog-ng/conf.d/billu-server.conf
#############################################################

## ---- SOURCES : d ou viennent les logs ---- ##

# Ecouter sur le reseau : UDP port 514 (leger, pas de confirmation)
source s_network_udp {
    syslog(ip("0.0.0.0") port(514) transport("udp"));
};

# Ecouter sur le reseau : TCP port 514 (fiable, avec confirmation)
source s_network_tcp {
    syslog(ip("0.0.0.0") port(514) transport("tcp"));
};

# Logs locaux de la VM Debian elle-meme
source s_local {
    system();
    internal();
};

## ---- DESTINATIONS : ou ecrire les logs ---- ##

# Un fichier par machine Windows : /srv/data/logs/windows/DC1.log
destination d_windows {
    file("/srv/data/logs/windows/${HOST}.log"
         template("${ISODATE} [${LEVEL}] ${HOST} ${PROGRAM}: ${MESSAGE}\n")
         create-dirs(yes)
         perm(0640));
};

# Un fichier par machine Linux : /srv/data/logs/linux/debian.log
destination d_linux {
    file("/srv/data/logs/linux/${HOST}.log"
         template("${ISODATE} [${LEVEL}] ${HOST} ${PROGRAM}: ${MESSAGE}\n")
         create-dirs(yes)
         perm(0640));
};

# Fichier centralise pour les scripts PowerShell BillU
destination d_scripts {
    file("/srv/data/logs/scripts/billu-scripts.log"
         template("${ISODATE} [${LEVEL}] ${HOST} ${PROGRAM}: ${MESSAGE}\n")
         perm(0640));
};

# Logs de la Debian locale
destination d_local {
    file("/srv/data/logs/linux/debian-local.log"
         template("${ISODATE} [${LEVEL}] ${PROGRAM}: ${MESSAGE}\n"));
};

## ---- FILTRES : selectionner les messages ---- ##

# Messages venant de DC1 ou DC2 (noms des machines Windows)
filter f_windows {
    host("DC1") or host("DC2") or host("DC1.billu.local") or host("DC2.billu.local");
};

# Messages des scripts PowerShell BillU (identifies par le programme)
filter f_scripts {
    program("BillU-Script");
};

## ---- REGLES DE ROUTAGE ---- ##

# Scripts PS BillU (traiter en premier pour eviter de les mettre dans Windows)
log {
    source(s_network_udp); source(s_network_tcp);
    filter(f_scripts);
    destination(d_scripts);
    flags(final);    # final = ne pas traiter dans les regles suivantes
};

# Logs Windows (DC1, DC2)
log {
    source(s_network_udp); source(s_network_tcp);
    filter(f_windows);
    destination(d_windows);
    flags(final);
};

# Tout le reste venant du reseau = Linux (autres machines)
log {
    source(s_network_udp); source(s_network_tcp);
    destination(d_linux);
};

# Logs locaux de la Debian elle-meme
log {
    source(s_local);
    destination(d_local);
};
