## NXLog configuration -- BillU Sprint 6
Moduledir %ROOT%\modules
CacheDir  %ROOT%\data
LogFile   %ROOT%\data\nxlog.log
LogLevel  INFO

# Extension Syslog : convertir en format Syslog standard
<Extension _syslog>
    Module  xm_syslog
</Extension>

# Source 1 : journaux Windows (Securite, Systeme, Application)
<Input in_windows_events>
    Module      im_msvistalog
    Query       <QueryList>
                  <Query Id="0">
                    <Select Path="Security">*[System[(Level=1 or Level=2 or Level=3 or Level=4)]]</Select>
                    <Select Path="System">*[System[(Level=1 or Level=2 or Level=3)]]</Select>
                    <Select Path="Application">*[System[(Level=1 or Level=2 or Level=3)]]</Select>
                  </Query>
                </QueryList>
    Exec        $Message = "EventID=" + $EventID + " " + $Message;
    Exec        to_syslog_bsd();
</Input>

# Source 2 : fichiers de logs BillU (format CMTrace -- une ligne par message)
<Input in_billu_scripts>
    Module      im_file
    File        "C:\\Windows\\Logs\\BillU\\*.log"
    SavePos     TRUE
    ReadFromLast TRUE
    Exec        $SourceName = "BillU-Script";
    Exec        to_syslog_bsd();
</Input>

# Destination : envoyer vers Syslog-ng sur la VM Debian -- UDP port 514
<Output out_syslogng>
    Module  om_udp
    Host    [172.16.100.20]
    Port    514
</Output>

# Routing : tout envoyer vers Syslog-ng
<Route r_all>
    Path    in_windows_events, in_billu_scripts => out_syslogng
</Route>
