# Creer le fichier de config rsyslog
cat > /etc/rsyslog.d/99-graylog.conf << 'EOF'
# Envoyer tous les logs locaux vers Graylog Syslog UDP 514
# @ = UDP   @@ = TCP
*.* @127.0.0.1:514
EOF

# Recharger rsyslog
systemctl restart rsyslog
systemctl status rsyslog --no-pager | grep "Active:"

# Tester : envoyer un message de test
logger "BillU-Test: rsyslog vers Graylog depuis Ubuntu 24.04"
sleep 2

echo "Verifier dans Graylog : Search > saisir 'BillU-Test'"
