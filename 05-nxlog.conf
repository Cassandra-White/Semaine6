## NXLog configuration BillU Sprint 6
## Envoie les logs Windows vers Graylog en format GELF UDP
## Remplacer [IP-GRAYLOG] par l IP reelle de la VM Debian

Moduledir %ROOT%\modules
CacheDir  %ROOT%\data
LogFile   %ROOT%\data\nxlog.log
LogLevel  INFO

# Extension GELF : format JSON structure pour Graylog
<Extension _gelf>
    Module  xm_gelf
</Extension>

# Extension JSON (pour enrichir les messages)
<Extension _json>
    Module  xm_json
</Extension>

# Source 1 : journaux Windows -- Security, System, Application
<Input in_windows>
    Module      im_msvistalog
    Query       <QueryList>
                  <Query Id="0">
                    <Select Path="Security">*</Select>
                    <Select Path="System">*[System[(Level=1 or Level=2 or Level=3)]]</Select>
                    <Select Path="Application">*[System[(Level=1 or Level=2 or Level=3)]]</Select>
                  </Query>
                </QueryList>
    Exec        $short_message = $Message;
    Exec        $application_name = "Windows-Events";
    Exec        to_gelf();
</Input>

# Source 2 : fichiers de logs BillU (scripts PowerShell)
<Input in_billu_scripts>
    Module          im_file
    File            "C:\\Windows\\Logs\\BillU\\*.log"
    SavePos         TRUE
    ReadFromLast    TRUE
    Exec            $short_message = $raw_event;
    Exec            $application_name = "BillU-Script";
    Exec            to_gelf();
</Input>

# Destination : Graylog GELF UDP port 12201
<Output out_graylog>
    Module      om_udp
    Host        [IP-GRAYLOG]
    Port        12201
    OutputType  GELF_UDP
</Output>

# Routing : toutes les sources vers Graylog
<Route r_all>
    Path    in_windows, in_billu_scripts => out_graylog
</Route>
